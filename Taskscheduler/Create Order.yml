info:
  name: Create Order
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:8081/api/orders
  body:
    type: json
    data: |-
      {
        "customerName": "John Doe",
        "customerEmail": "john@example.com",
        "amount": 999.99
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
