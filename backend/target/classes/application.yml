server:
  port: 8080

spring:
  application:
    name: event-hub

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskscheduler}
    username: ${DB_USER:taskscheduler}
    password: ${DB_PASS:taskscheduler}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      pool-name: TaskSchedulerPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    mongodb:
      host: ${MONGO_HOST:localhost}
      port: ${MONGO_PORT:27017}
      database: eventhub

    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 300000

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        acks: all
        retries: 3
        enable.idempotence: true
    consumer:
      group-id: notification-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.eventhub.kafka"
        spring.json.value.default.type: com.eventhub.kafka.TaskExecutedEvent
      enable-auto-commit: false
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-very-long-secret-key-minimum-64-characters-for-hmac-sha512}
    expiration-ms: 86400000

  rate-limit:
    requests-per-minute: 100
    window-seconds: 60

  scheduler:
    thread-pool-size: 10

  cache:
    task-ttl-seconds: 300

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [cid=%X{correlationId}] [tid=%X{taskId}] %logger{36} - %msg%n"
  level:
    root: INFO
    com.eventhub: DEBUG
    org.springframework.kafka: INFO
    org.flywaydb: INFO
